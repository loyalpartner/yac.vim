name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-linux
          - os: linux
            arch: aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-linux
          - os: darwin
            arch: x86_64
            runner: macos-13
            target: x86_64-macos
          - os: darwin
            arch: aarch64
            runner: macos-latest
            target: aarch64-macos
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4

    - uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build ReleaseFast
      run: zig build -Doptimize=ReleaseFast

    - name: Rename binary
      run: mv zig-out/bin/yacd yacd-${{ matrix.os }}-${{ matrix.arch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: yacd-${{ matrix.os }}-${{ matrix.arch }}
        path: yacd-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: List artifacts
      run: ls -la artifacts/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: artifacts/yacd-*
