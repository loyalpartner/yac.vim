name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  zig:
    name: Zig Build & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: mlugg/setup-zig@v2
      with:
        version: master
    - name: Check formatting
      run: cd yacd && zig fmt --check src/
    - name: Build (ReleaseSafe)
      run: make release
    - name: Unit tests
      run: make test-unit
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: yacd
        path: yacd/zig-out/bin/yacd

  daemon-tests:
    name: Daemon Integration Tests
    runs-on: ubuntu-latest
    needs: zig
    steps:
    - uses: actions/checkout@v4
    - uses: mlugg/setup-zig@v2
      with:
        version: master
    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: yacd
        path: yacd/zig-out/bin
    - run: chmod +x yacd/zig-out/bin/yacd
    - name: Install ZLS (master — matches Zig master)
      run: |
        curl -L "https://builds.zigtools.org/zls-linux-x86_64-0.16.0-dev.master.tar.xz" -o zls.tar.xz \
          || curl -L "https://zigtools-releases.s3.amazonaws.com/zls/master/x86_64-linux/zls" -o zls
        if [ -f zls.tar.xz ]; then tar -xf zls.tar.xz; fi
        chmod +x zls && sudo mv zls /usr/local/bin/
        zls --version || true
    - uses: astral-sh/setup-uv@v5
    - name: Run daemon integration tests
      run: uv run pytest tests/daemon/ -v --junitxml=daemon-results.xml
    - name: Test report
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: daemon-results.xml
        check_name: Daemon Tests

  e2e:
    name: Vim E2E Tests
    runs-on: ubuntu-latest
    needs: zig
    steps:
    - uses: actions/checkout@v4
    - uses: mlugg/setup-zig@v2
      with:
        version: master
    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: yacd
        path: yacd/zig-out/bin
    - run: chmod +x yacd/zig-out/bin/yacd
    - name: Install LSP servers
      run: |
        # ZLS (Zig)
        ZLS_TAG=$(curl -s https://api.github.com/repos/zigtools/zls/releases/latest | jq -r .tag_name)
        curl -L "https://github.com/zigtools/zls/releases/download/${ZLS_TAG}/zls-x86_64-linux.tar.xz" | tar -xJ
        sudo mv zls /usr/local/bin/
        zls --version
        # clangd (C/C++)
        sudo apt-get update -qq && sudo apt-get install -y -qq clangd
        clangd --version
    - uses: astral-sh/setup-uv@v5
    - name: Run Vim E2E tests (parallel)
      run: uv run pytest tests/test_e2e.py -v -n auto --junitxml=e2e-results.xml
    - name: Test report
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: e2e-results.xml
        check_name: Vim E2E Tests

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [zig, daemon-tests, e2e]
    if: always()
    steps:
    - name: Check results
      if: >-
        needs.zig.result != 'success' ||
        needs.daemon-tests.result != 'success' ||
        needs.e2e.result != 'success'
      run: exit 1
    - run: echo "All checks passed"
