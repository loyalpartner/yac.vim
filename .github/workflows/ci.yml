name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  zig:
    name: Zig Build & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: mlugg/setup-zig@v2
      with:
        version: master
    - name: Check formatting
      run: cd yacd && zig fmt --check src/
    - name: Build (ReleaseSafe)
      run: make release
    - name: Unit tests
      run: make test-unit
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: yacd
        path: yacd/zig-out/bin/yacd

  daemon-tests:
    name: Daemon Integration Tests
    runs-on: ubuntu-latest
    needs: zig
    steps:
    - uses: actions/checkout@v4
    - uses: mlugg/setup-zig@v2
      with:
        version: master
    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: yacd
        path: yacd/zig-out/bin
    - run: chmod +x yacd/zig-out/bin/yacd
    - name: Install ZLS (matching Zig version)
      run: |
        ZIG_VER=$(zig version)
        ZIG_VER_ENC=$(echo "$ZIG_VER" | sed 's/+/%2B/g')
        ZLS_URL=$(curl -s "https://releases.zigtools.org/v1/zls/select-version?zig_version=${ZIG_VER_ENC}&compatibility=only-runtime" \
          | jq -r '."x86_64-linux".tarball')
        echo "Zig: $ZIG_VER → ZLS: $ZLS_URL"
        curl -L "$ZLS_URL" | tar -xJ
        chmod +x zls && sudo mv zls /usr/local/bin/
        zls --version || true
    - uses: astral-sh/setup-uv@v5
    - name: Run daemon integration tests
      run: uv run pytest tests/daemon/ -v

  e2e:
    name: Vim E2E Tests
    runs-on: ubuntu-latest
    needs: zig
    steps:
    - uses: actions/checkout@v4
    - uses: mlugg/setup-zig@v2
      with:
        version: master
    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: yacd
        path: yacd/zig-out/bin
    - run: chmod +x yacd/zig-out/bin/yacd
    - name: Install Vim with +terminal
      run: sudo apt-get update -qq && sudo apt-get install -y -qq vim-gtk3
    - name: Install LSP servers
      run: |
        ZIG_VER=$(zig version)
        ZIG_VER_ENC=$(echo "$ZIG_VER" | sed 's/+/%2B/g')
        ZLS_URL=$(curl -s "https://releases.zigtools.org/v1/zls/select-version?zig_version=${ZIG_VER_ENC}&compatibility=only-runtime" \
          | jq -r '."x86_64-linux".tarball')
        echo "Zig: $ZIG_VER → ZLS: $ZLS_URL"
        curl -L "$ZLS_URL" | tar -xJ
        chmod +x zls && sudo mv zls /usr/local/bin/
        zls --version || true
        # clangd (C/C++)
        sudo apt-get install -y -qq clangd
        clangd --version
    - uses: astral-sh/setup-uv@v5
    - name: Run Vim E2E tests (parallel, limited workers for CI)
      run: uv run pytest tests/test_e2e.py -v -n 4

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [zig, daemon-tests, e2e]
    if: always()
    steps:
    - name: Check results
      if: >-
        needs.zig.result != 'success' ||
        needs.daemon-tests.result != 'success' ||
        needs.e2e.result != 'success'
      run: exit 1
    - run: echo "All checks passed"
